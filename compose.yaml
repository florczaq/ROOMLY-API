services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-roomlydb}
      POSTGRES_USER: ${POSTGRES_USER:-roomly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roomly}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roomly} -d ${POSTGRES_DB:-roomlydb}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-secret-key}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-roomlydb}
      POSTGRES_USER: ${POSTGRES_USER:-roomly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roomly}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-roomlydb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-roomly}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-roomly}
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ./src/main/java/org/roomly/assets:/app/src/main/java/org/roomly/assets
volumes:
  postgres_data: