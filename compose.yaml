services:
  postgres:
    image: postgres:16
    container_name: roomly-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-roomlydb}
      POSTGRES_USER: ${POSTGRES_USER:-roomly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roomly}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roomly} -d ${POSTGRES_DB:-roomlydb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roomly-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-secret-key}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-roomlydb}
      POSTGRES_USER: ${POSTGRES_USER:-roomly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roomly}
      AVATAR_STORAGE_PATH: /app/assets/avatars
      COLORS_STORAGE_PATH: /app/assets/colors
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ./src/main/java/org/roomly/assets:/app/assets
volumes:
  postgres_data: