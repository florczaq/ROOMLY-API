# === TEST CONFIGURATION (overrides main application.properties) ===
spring.config.import=

# === IN-MEMORY H2 DATABASE FOR TESTS ===
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# === JWT (fixed test secret - 512-bit HS512 safe key) ===

# === DISABLE UNNECESSARY FEATURES IN TESTS ===
spring.jpa.show-sql=false

# === AVATAR / COLORS STORAGE (test fixtures) ===
avatar.storage.path=./src/test/resources/test-assets/avatars
colors.storage.path=./src/main/java/org/roomly/assets/colors


