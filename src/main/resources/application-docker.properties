# === DATABASE CONFIGURATION (Docker Compose run) ===
spring.datasource.url=${DB_URL:jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${POSTGRES_DB:roomlydb}}
spring.datasource.username=${POSTGRES_USER:roomly}
spring.datasource.password=${POSTGRES_PASSWORD:roomly}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

