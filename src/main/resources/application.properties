spring.application.name=ROOMLY
# Avatars & colors
avatar.storage.path=./src/main/java/org/roomly/assets/avatars
colors.storage.path=./src/main/java/org/roomly/assets/colors
colors.storage.filename=colors_catalog.json

#Database
spring.datasource.url=jdbc:h2:mem:roomlydb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# JWT
security.jwt.refresh.token.expiration=604800000
security.jwt.access.token.expiration=3600000
security.jwt.secret=your_jwt_secret_key

# External API
external.api.openfoodfacts.url=https://world.openfoodfacts.org/api/v0/product