# === DATABASE CONFIGURATION (Local host run) ===
spring.datasource.url=${DB_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:roomlydb}}
spring.datasource.username=${POSTGRESS_USER:roomly}
spring.datasource.password=${POSTGRESS_PASSWORD:roomly}
spring.datasource.driver-class-name=org.postgresql.Driver

